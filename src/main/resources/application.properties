spring.application.name=Smart Recover

# PostgreSQL Database Configuration (Replit built-in)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# DataSource is configured in DataSourceConfig.java (parses DATABASE_URL)

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson date format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
jwt.secret=SmartRecoverAISecretKeyForJWTAuthentication2026SecureKey256Bits!!
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server port
server.port=8080

# Logging
logging.level.com.smartrecover=INFO
logging.level.org.springframework.security=WARN
